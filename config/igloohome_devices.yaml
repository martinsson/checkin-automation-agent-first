# Property → Igloohome device map for door-code creation.
#
# The device id is the Igloohome lock a generated PIN opens. For the 6 rentals
# below it comes from each property's **Beds24 template variable n°8** (the same
# value the Igloohome→Beds24 Make scenario reads as `deviceId`), fetched via the
# properties endpoint. Hippocrate is not in Beds24; its id was given directly.
#
# Used by: the /door-codes web form and the agent's create_door_code tool, to
# put `deviceId` in the Make webhook payload (see docs/make/README.md).
#
# Keys are matched case-insensitively against the "property" field of a request.
# `default` is used when no property is given or none matches.

default: ""            # fallback lock (leave empty to require an explicit match)

properties:
  "Velours T2": "IGK343001670"      # Beds24 id 318188
  "Studio Écrin": "IGK343001606"    # Beds24 id 318189
  "Terracotta": "IGK343002203"      # Beds24 id 326123
  "Le Matisse": "EK1X15cbb024"      # Beds24 id 326234
  "La Palma": "IGK343002588"        # Beds24 id 326275
  "Le Fernand": "EK1X152a8431"      # Beds24 id 328510 (Campus / Parking)
  # Not in Beds24 — id provided manually. NOTE: verify — reads "OE1X14cc9418"
  # but the other EK1X devices start "EK1X", so this may be "EK1X14cc9418".
  "Hippocrate": "OE1X14cc9418"
