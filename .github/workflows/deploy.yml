name: Deploy

# Equivalent of `make deploy`: rsync source to the Hetzner server, build the
# Docker images there, and restart services via docker compose.
#
# Required repository secrets:
#   DEPLOY_SSH_KEY     — private key authorized on the server (e.g. for user 'app')
#   DEPLOY_HOST        — server hostname or IP (the 'hetzner' ~/.ssh/config alias
#                        doesn't exist on runners, so host/user are passed explicitly)
#   DEPLOY_USER        — SSH user on the server (e.g. 'app' or 'root')
# Optional:
#   DEPLOY_KNOWN_HOSTS — output of `ssh-keyscan <host>`; pins the server's host key.
#                        If unset, the workflow falls back to scanning at run time.
#   MAKE_IGLOOHOME_WEBHOOK_URL — Make custom-webhook URL that mints Igloohome PINs.
#                        When set, it's upserted into the server .env at deploy time
#                        so the /door-codes form and agent tool can create codes.
#   MAKE_IGLOOHOME_API_KEY     — optional key if that webhook requires one.
#   BEDS24_READ_ALL_TOKEN      — long-life Beds24 read token. Powers the
#                        /early-checkin form (list a property's upcoming reservations).
#   BEDS24_REFRESH_TOKEN       — Beds24 refresh token; mints a write token so
#                        /early-checkin can send the guest their access code.
#
# The .env file itself is never rsynced by this workflow (same as `make deploy` —
# it lives only on the server; see the Makefile header for first-time setup).
# The "Sync app secrets" step below is the one exception: it edits individual
# keys in the server .env in place, only for secrets that are actually set.

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $DEPLOY_HOST
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
          EOF

      - name: Sync app secrets into server .env
        # Upsert selected app secrets into the server-side .env (which `make
        # deploy` never rsyncs). Each key is written only when its secret is
        # set, so this is a no-op until you add the secret in repo Settings →
        # Secrets. Runs before Deploy so the rebuilt container reads the new
        # value on `docker compose up -d`. Values travel over ssh stdin (never
        # the command line or the log); only key names are printed.
        env:
          MAKE_IGLOOHOME_WEBHOOK_URL: ${{ secrets.MAKE_IGLOOHOME_WEBHOOK_URL }}
          MAKE_IGLOOHOME_API_KEY: ${{ secrets.MAKE_IGLOOHOME_API_KEY }}
          BEDS24_READ_ALL_TOKEN: ${{ secrets.BEDS24_READ_ALL_TOKEN }}
          BEDS24_REFRESH_TOKEN: ${{ secrets.BEDS24_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          # Must match REMOTE_DIR in the Makefile.
          REMOTE_DIR=/home/app/checkin-automation-agent-first

          upsert() {
            key="$1"; val="$2"
            if [ -z "$val" ]; then
              echo "· $key not set — leaving server .env untouched"
              return 0
            fi
            printf '%s' "$val" | ssh deploy-target "
              set -eu
              cd '$REMOTE_DIR'
              touch .env && chmod 600 .env
              val=\$(cat)
              tmp=\$(mktemp)
              grep -v '^$key=' .env > \"\$tmp\" || true
              printf '%s=%s\n' '$key' \"\$val\" >> \"\$tmp\"
              mv \"\$tmp\" .env
            "
            echo "✓ $key synced into server .env"
          }

          upsert MAKE_IGLOOHOME_WEBHOOK_URL "${MAKE_IGLOOHOME_WEBHOOK_URL:-}"
          upsert MAKE_IGLOOHOME_API_KEY "${MAKE_IGLOOHOME_API_KEY:-}"
          upsert BEDS24_READ_ALL_TOKEN "${BEDS24_READ_ALL_TOKEN:-}"
          upsert BEDS24_REFRESH_TOKEN "${BEDS24_REFRESH_TOKEN:-}"

      - name: Deploy
        run: make deploy SERVER=deploy-target
